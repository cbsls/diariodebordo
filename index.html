<html lang="pt-BR">
<head>

  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background:#e9edf3; margin:0; padding:18px; }
    h1 {
      background:#d51313;
      color:#fff;
      padding:18px;
      border-radius:18px;
      text-align:center;
      margin:0 0 18px 0;
      font-size:28px;
    }
    .card {
      background:#fff;
      border-radius:18px;
      padding:20px;
      margin-bottom:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    label {
      display:block;
      font-size:18px;
      font-weight:bold;
      margin:8px 0 6px;
    }
    input, select {
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #ccc;
      font-size:18px;
      margin-bottom:12px;
      background:#fff;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#d51313;
      color:#fff;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;

    button:disabled {

      cursor:wait;
    }
    .hidden { display:none; }
    .ok {

      font-weight:bold;

    }
    .erro {

      font-weight:bold;

    .muted {

      font-size:14px;
    }
    .registro {
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
      background:#fafafa;
    }
    .registro b {
      font-size:18px;
    }
    .linha-acoes {
      margin-top:10px;
    }
    .btn-pdf {
      background:#0f4c81;
      font-size:16px;
      padding:12px;
    }
    .btn-limpar {
      background:#666;
      font-size:15px;
      padding:12px;
      margin-top:0;
      margin-bottom:12px;
    }
    .info-vtr {
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
      line-height:1.5;
      font-size:16px;
    }
    .assinatura-box {
      border:1px solid #ccc;
      border-radius:14px;
      background:#fff;
      overflow:hidden;
      margin-bottom:8px;
    }
    canvas {
      width:100%;
      height:160px;
      display:block;
      touch-action:none;
      background:#fff;
    }
    .assinatura-label {
      color:#666;
      font-size:14px;
      margin:-4px 0 12px 0;

<body>

    <div id="userOk"></div>

    <label for="vtr">VTR</label>
    <select id="vtr">
      <option value="AR-426">AR-426</option>
      <option value="ABT-0535">ABT-0535</option>
      <option value="ABT-7992">ABT-7992</option>
      <option value="ATP-1225">ATP-1225</option>
      <option value="ATP-370">ATP-370</option>
      <option value="ATP-9316">ATP-9316</option>

    <div class="info-vtr" id="infoVtr"></div>

    <label for="data">Data</label>
    <input id="data" type="date" />

    <label for="localPartida">Local de Partida</label>
    <input id="localPartida" type="text" placeholder="Informe o local de partida" />

    <label for="kmIni">KM Inicial</label>

    <label for="horaPartida">Hora da Partida</label>

    <label for="kmFim">KM Final</label>
    <input id="kmFim" type="number" inputmode="numeric" />

    <label for="horaChegada">Hora da Chegada</label>

    <label for="condutor">Nome Condutor</label>
    <input id="condutor" readonly />

    <label for="usuario">Nome Usuário</label>
    <input id="usuario" type="text" placeholder="Informe o nome do usuário" />

    <label>Assinatura Condutor</label>
    <div class="assinatura-box">
      <canvas id="assinaturaCondutor"></canvas>
    </div>
    <div class="assinatura-label">Assine com o dedo na área acima</div>
    <button type="button" class="btn-limpar" id="btnLimparAssCondutor">Limpar assinatura do condutor</button>

    <label>Assinatura Usuário</label>
    <div class="assinatura-box">
      <canvas id="assinaturaUsuario"></canvas>
    </div>
    <div class="assinatura-label">Assine com o dedo na área acima</div>

  <script>
    const USUARIOS = [

      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }

    const VTRS = {
      "AR-426": {
        placa: "TQV 8D59",

      },

      },

        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      },
      "ATP-1225": {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      },
      "ATP-370": {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      },

    const SUPABASE_URL = "https://nypebmbqcbrvbutamzrh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let logado = null;

    const elIdFunc = document.getElementById("idFunc");
    const elBtnEntrar = document.getElementById("btnEntrar");

    const canvasCondutor = document.getElementById("assinaturaCondutor");
    const canvasUsuario = document.getElementById("assinaturaUsuario");
    const btnLimparAssCondutor = document.getElementById("btnLimparAssCondutor");
    const btnLimparAssUsuario = document.getElementById("btnLimparAssUsuario");

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    function esc(texto) {
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function msgOk(el, texto) {
      el.innerHTML = `<div class="ok">${texto}</div>`;
    }

    function msgErro(el, texto) {
      el.innerHTML = `<div class="erro">${texto}</div>`;
    }

    function msgMuted(el, texto) {
      el.innerHTML = `<div class="muted">${texto}</div>`;
    }

    function atualizarInfoVtr() {
      const dados = VTRS[elVtr.value] || {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      };

      elInfoVtr.innerHTML = `
        <b>PLACA:</b> ${esc(dados.placa)}<br>
        <b>MARCA/MODELO:</b> ${esc(dados.marcamodelo)}<br>
        <b>ÓRGÃO/ENTIDADE:</b> ${esc(dados.orgao)}
      `;
    }

    function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        msgErro(elUserOk, "❌ ID não cadastrada");
        elFormBox.classList.add("hidden");
        return;
      }

      logado = user;
      elCondutor.value = user.guerra;
      msgOk(elUserOk, `✅ ${user.guerra}`);
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }

      atualizarInfoVtr();
    }

    function ajustarCanvas(canvas) {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000";
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, rect.width, rect.height);
    }

    function inicializarAssinatura(canvas) {
      const ctx = canvas.getContext("2d");
      let desenhando = false;

      function posicao(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
          x: touch.clientX - rect.left,
          y: touch.clientY - rect.top
        };
      }

      function iniciar(e) {
        desenhando = true;
        const p = posicao(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        e.preventDefault();
      }

      function mover(e) {
        if (!desenhando) return;
        const p = posicao(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        e.preventDefault();
      }

      function parar() {
        desenhando = false;
      }

      canvas.addEventListener("mousedown", iniciar);
      canvas.addEventListener("mousemove", mover);
      canvas.addEventListener("mouseup", parar);
      canvas.addEventListener("mouseleave", parar);

      canvas.addEventListener("touchstart", iniciar, { passive: false });
      canvas.addEventListener("touchmove", mover, { passive: false });
      canvas.addEventListener("touchend", parar);
    }

    function limparCanvas(canvas) {
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, rect.width, rect.height);
    }

    function assinaturaVazia(canvas) {
      const ctx = canvas.getContext("2d");
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 0; i < pixels.length; i += 4) {
        if (!(pixels[i] === 255 && pixels[i + 1] === 255 && pixels[i + 2] === 255 && pixels[i + 3] === 255)) {
          return false;
        }
      }
      return true;
    }

    async function salvar() {
      if (!logado) {
        msgErro(elStatusSalvar, "❌ Faça o login primeiro");
        return;
      }

      if (!elData.value) {
        msgErro(elStatusSalvar, "❌ Informe a data");
        return;
      }

      if (!elLocalPartida.value.trim()) {
        msgErro(elStatusSalvar, "❌ Informe o local de partida");
        return;
      }

      if (elKmIni.value === "" || elKmFim.value === "") {
        msgErro(elStatusSalvar, "❌ Informe KM inicial e final");
        return;
      }

      if (!elHoraPartida.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da partida");
        return;
      }

      if (!elHoraChegada.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da chegada");
        return;
      }

      if (!elUsuario.value.trim()) {
        msgErro(elStatusSalvar, "❌ Informe o nome do usuário");
        return;
      }

      const kmIniValor = Number(elKmIni.value);
      const kmFimValor = Number(elKmFim.value);

      if (Number.isNaN(kmIniValor) || Number.isNaN(kmFimValor)) {
        msgErro(elStatusSalvar, "❌ KM inválido");
        return;
      }

      if (kmFimValor < kmIniValor) {
        msgErro(elStatusSalvar, "❌ KM final não pode ser menor que o inicial");
        return;
      }

      const dadosVtr = VTRS[elVtr.value] || {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      };

      const assinaturaCondutor = assinaturaVazia(canvasCondutor) ? "" : canvasCondutor.toDataURL("image/png");
      const assinaturaUsuario = assinaturaVazia(canvasUsuario) ? "" : canvasUsuario.toDataURL("image/png");

      elBtnSalvar.disabled = true;
      msgMuted(elStatusSalvar, "Salvando...");

      try {
        const { error } = await supabaseClient
          .from("diario")
          .insert([{
            vtr: elVtr.value,
            placa: dadosVtr.placa,
            marcamodelo: dadosVtr.marcamodelo,
            orgao: dadosVtr.orgao,
            data: elData.value,
            localpartida: elLocalPartida.value.trim(),
            kmini: kmIniValor,
            horapartida: elHoraPartida.value,
            kmfim: kmFimValor,
            horachegada: elHoraChegada.value,
            condutor: elCondutor.value,
            usuario: elUsuario.value.trim(),
            assinaturacondutor: assinaturaCondutor,
            assinaturausuario: assinaturaUsuario
          }]);

        if (error) {
          msgErro(elStatusSalvar, `❌ Erro ao salvar: ${error.message}`);
          return;
        }

        msgOk(elStatusSalvar, "☁️ Salvo com sucesso");
        elLocalPartida.value = "";
        elKmIni.value = "";
        elHoraPartida.value = "";
        elKmFim.value = "";
        elHoraChegada.value = "";
        elUsuario.value = "";
        limparCanvas(canvasCondutor);
        limparCanvas(canvasUsuario);
        await carregar();
      } catch (e) {
        console.error(e);
        msgErro(elStatusSalvar, "❌ Falha inesperada ao salvar");
      } finally {
        elBtnSalvar.disabled = false;
      }
    }

    async function carregar() {
      try {
        const { data, error } = await supabaseClient
          .from("diario")
          .select("*")
          .order("id", { ascending: false });

        if (error) {
          msgErro(elLista, `❌ Erro ao listar: ${error.message}`);
          return;
        }

        if (!data || data.length === 0) {
          msgMuted(elLista, "Nenhum registro ainda.");
          return;
        }

        elLista.innerHTML = data.map(r => `
          <div class="registro">
            <b>${esc(r.vtr)}</b><br>
            Data: ${esc(r.data)}<br>
            Local de Partida: ${esc(r.localpartida)}<br>
            KM: ${esc(r.kmini)} → ${esc(r.kmfim)}<br>
            Hora: ${esc(r.horapartida)} → ${esc(r.horachegada)}<br>
            Condutor: ${esc(r.condutor)}<br>
            Usuário: ${esc(r.usuario)}
            <div class="linha-acoes">
              <button class="btn-pdf" type="button" onclick="gerarPDF(${Number(r.id)})">📄 PDF</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        console.error(e);
        msgErro(elLista, "❌ Falha inesperada ao listar");
      }
    }

    async function gerarPDF(id) {
      try {
        const { data, error } = await supabaseClient
          .from("diario")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          alert("Erro ao buscar registro.");
          return;
        }

        const w = window.open("", "_blank");
        if (!w) {
          alert("Não foi possível abrir a janela do PDF.");
          return;
        }

        const assinaturaCondutorHtml = data.assinaturacondutor
          ? `<img src="${data.assinaturacondutor}" style="max-width:260px; max-height:90px;">`
          : "Não informada";

        const assinaturaUsuarioHtml = data.assinaturausuario
          ? `<img src="${data.assinaturausuario}" style="max-width:260px; max-height:90px;">`
          : "Não informada";

        w.document.write(`
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>PDF Diário de Bordo</title>
            <style>
              body { font-family: Arial, Helvetica, sans-serif; padding: 30px; color: #000; }
              h2 { text-align: center; margin-bottom: 18px; }
              .topo { margin-bottom: 16px; line-height: 1.6; }
              table { width: 100%; border-collapse: collapse; margin-top: 12px; }
              th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; vertical-align: middle; }
              .assinaturas { margin-top: 18px; width: 100%; border-collapse: collapse; }
              .assinaturas td { border: 1px solid #000; padding: 12px; text-align: center; vertical-align: top; }
              .titulo-ass { font-weight: bold; margin-bottom: 8px; }
            </style>
          </head>
          <body>
            <h2>DIÁRIO DE BORDO</h2>

            <div class="topo">
              <b>PLACA:</b> ${esc(data.placa)}<br>
              <b>MARCA/MODELO:</b> ${esc(data.marcamodelo)}<br>
              <b>ÓRGÃO/ENTIDADE:</b> ${esc(data.orgao)}
            </div>

            <table>
              <tr>
                <th>DATA</th>
                <th>LOCAL DE PARTIDA</th>
                <th>KM DO VEÍC. NA PARTIDA</th>
                <th>HORA DA PARTIDA</th>
                <th>KM DO VEÍC. NO DESTINO</th>
                <th>HORA DA CHEGADA</th>
                <th>NOME CONDUTOR</th>
                <th>NOME USUÁRIO</th>
              </tr>
              <tr>
                <td>${esc(data.data)}</td>
                <td>${esc(data.localpartida)}</td>
                <td>${esc(data.kmini)}</td>
                <td>${esc(data.horapartida)}</td>
                <td>${esc(data.kmfim)}</td>
                <td>${esc(data.horachegada)}</td>
                <td>${esc(data.condutor)}</td>
                <td>${esc(data.usuario)}</td>
              </tr>
            </table>

            <table class="assinaturas">
              <tr>
                <td>
                  <div class="titulo-ass">ASSINATURA CONDUTOR</div>
                  ${assinaturaCondutorHtml}
                </td>
                <td>
                  <div class="titulo-ass">ASSINATURA USUÁRIO</div>
                  ${assinaturaUsuarioHtml}
                </td>
              </tr>
            </table>

            <script>
              window.onload = function(){ window.print(); };
            <\/script>
          </body>
          </html>
        `);
        w.document.close();
      } catch (e) {
        console.error(e);
        alert("Falha ao gerar PDF.");
      }
    }

    window.gerarPDF = gerarPDF;

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvar);
    elVtr.addEventListener("change", atualizarInfoVtr);

    btnLimparAssCondutor.addEventListener("click", function() {
      limparCanvas(canvasCondutor);

    btnLimparAssUsuario.addEventListener("click", function() {

      if (e.key === "Enter") login();
    });

    elHoraChegada.addEventListener("keydown", function(e) {
      if (e.key === "Enter") salvar();
    });

    if (!elData.value) {
      elData.value = hojeISO();
    }

    ajustarCanvas(canvasCondutor);
    ajustarCanvas(canvasUsuario);
    inicializarAssinatura(canvasCondutor);
    inicializarAssinatura(canvasUsuario);
    atualizarInfoVtr();
    carregar();

    window.addEventListener("resize", function() {
      const assinaturaCondutorAtual = assinaturaVazia(canvasCondutor) ? "" : canvasCondutor.toDataURL("image/png");
      const assinaturaUsuarioAtual = assinaturaVazia(canvasUsuario) ? "" : canvasUsuario.toDataURL("image/png");

      ajustarCanvas(canvasCondutor);
      ajustarCanvas(canvasUsuario);

      if (assinaturaCondutorAtual) {
        const img1 = new Image();
        img1.onload = function() {
          const ctx1 = canvasCondutor.getContext("2d");
          const rect1 = canvasCondutor.getBoundingClientRect();
          ctx1.drawImage(img1, 0, 0, rect1.width, rect1.height);
        };
        img1.src = assinaturaCondutorAtual;
      }

      if (assinaturaUsuarioAtual) {
        const img2 = new Image();
        img2.onload = function() {
          const ctx2 = canvasUsuario.getContext("2d");
          const rect2 = canvasUsuario.getBoundingClientRect();
          ctx2.drawImage(img2, 0, 0, rect2.width, rect2.height);
        };
        img2.src = assinaturaUsuarioAtual;
      }
    });
  </script>
