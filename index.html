<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Bordo CBMRS</title>

<style>
body{
  font-family: Arial;
  background:#eef3f8;
  margin:0;
  padding:10px;
}

h1{
  background:#b71c1c;
  color:#fff;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:#b71c1c;
  color:#fff;
  width:100%;
}

.btn-sec{
  background:#ccc;
}

.registro{
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.hidden{display:none;}

</style>
</head>

<body>

<h1>🚒 Diário de Bordo</h1>

<div class="card">
<label>ID Func</label>
<input id="idFunc">

<button class="btn" onclick="login()">Entrar</button>

<div id="userOk"></div>
</div>

<div class="card hidden" id="formBox">

<label>VTR</label>
<select id="vtr">
<option>AR-426</option>
<option>ABT-0535</option>
<option>ABT-7992</option>
<option>ATP-1225</option>
<option>ATP-370</option>
<option>ATP-9316</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Local de Partida</label>
<input id="partida">

<label>KM Partida</label>
<input type="number" id="kmIni">

<label>Hora Partida</label>
<input type="time" id="horaIni">

<label>KM Chegada</label>
<input type="number" id="kmFim">

<label>Hora Chegada</label>
<input type="time" id="horaFim">

<label>Condutor</label>
<input id="condutor">

<label>Usuário</label>
<input id="usuario">

<button class="btn" onclick="salvar()">Salvar</button>

</div>

<div class="card">
<h3>Registros</h3>
<div id="lista"></div>
</div>

<script>

const ADMIN = "193cbmrs";
let logado = false;
let editando = null;

function login(){
  const id = document.getElementById("idFunc").value;
  if(id.length < 3){
    alert("ID inválida");
    return;
  }
  logado = true;
  document.getElementById("userOk").innerHTML = "✅ Acesso liberado";
  document.getElementById("formBox").classList.remove("hidden");
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("db")||"[]");

  const obj = {
    id: editando || Date.now(),
    vtr: vtr.value,
    data: data.value,
    partida: partida.value,
    kmIni: kmIni.value,
    horaIni: horaIni.value,
    kmFim: kmFim.value,
    horaFim: horaFim.value,
    condutor: condutor.value,
    usuario: usuario.value
  };

  if(editando){
    dados = dados.map(r=> r.id==editando?obj:r);
    editando = null;
  }else{
    dados.push(obj);
  }

  localStorage.setItem("db",JSON.stringify(dados));
  limpar();
  render();
}

function limpar(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

function render(){
  const dados = JSON.parse(localStorage.getItem("db")||"[]");
  lista.innerHTML="";

  dados.reverse().forEach(r=>{
    lista.innerHTML += `
    <div class="registro">
      <b>${r.vtr}</b> - ${r.data}
      <br>
      KM: ${r.kmIni} → ${r.kmFim}

      <div>
        <button onclick="editar(${r.id})">✏️</button>
        <button onclick="excluir(${r.id})">🗑️</button>
      </div>
    </div>
    `;
  });
}

function editar(id){
  const senha = prompt("Senha admin:");
  if(senha!==ADMIN) return alert("Senha incorreta");

  const dados = JSON.parse(localStorage.getItem("db"));
  const r = dados.find(x=>x.id==id);

  vtr.value = r.vtr;
  data.value = r.data;
  partida.value = r.partida;
  kmIni.value = r.kmIni;
  horaIni.value = r.horaIni;
  kmFim.value = r.kmFim;
  horaFim.value = r.horaFim;
  condutor.value = r.condutor;
  usuario.value = r.usuario;

  editando = id;
}

function excluir(id){
  const senha = prompt("Senha admin:");
  if(senha!==ADMIN) return alert("Senha incorreta");

  let dados = JSON.parse(localStorage.getItem("db"));
  dados = dados.filter(r=>r.id!=id);

  localStorage.setItem("db",JSON.stringify(dados));
  render();
}

render();

</script>

</body>
</html>
