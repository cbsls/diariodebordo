<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚒 Diário de Bordo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background: #e9edf3; margin: 0; padding: 18px; }
    h1 {
      background: #c81919;
      color: #fff;
      padding: 18px;
      border-radius: 18px;
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 28px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 18px;
      margin: 8px 0 6px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #ccc;
      font-size: 18px;
      margin-bottom: 10px;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #c81919;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .hidden { display: none; }
    .ok {
      margin-top: 10px;
      font-weight: bold;
      color: #0a7a28;
      font-size: 18px;
    }
    .erro {
      margin-top: 10px;
      font-weight: bold;
      color: #b00020;
      font-size: 16px;
    }
    .registro {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .registro b {
      font-size: 18px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>🚒 Diário de Bordo</h1>

  <div class="card">
    <label for="idFunc">ID Func</label>
    <input id="idFunc" type="text" inputmode="numeric" placeholder="Digite sua ID funcional" />
    <button type="button" id="btnEntrar">Entrar</button>
    <div id="userOk"></div>
  </div>

  <div class="card hidden" id="formBox">
    <label for="vtr">VTR</label>
    <select id="vtr">
      <option value="AR-426">AR-426</option>
      <option value="ABT-0535">ABT-0535</option>
      <option value="ABT-7992">ABT-7992</option>
      <option value="ATP-1225">ATP-1225</option>
      <option value="ATP-370">ATP-370</option>
      <option value="ATP-9316">ATP-9316</option>
    </select>

    <label for="data">Data</label>
    <input id="data" type="date" />

    <label for="kmIni">KM Inicial</label>
    <input id="kmIni" type="number" inputmode="numeric" />

    <label for="kmFim">KM Final</label>
    <input id="kmFim" type="number" inputmode="numeric" />

    <label for="condutor">Condutor</label>
    <input id="condutor" type="text" readonly />

    <button type="button" id="btnSalvar">Salvar</button>
    <div id="statusSalvar"></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">Registros</h2>
    <div id="lista"></div>
  </div>

  <script>
    const supabaseUrl = "https://nypebmbqcbrvbutamzrh.supabase.co";
    const supabaseKey = "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const USUARIOS = [
      { guerra: "1º SGT VICENTE", id: "2614960" },
      { guerra: "2º SGT ANDERSON", id: "2882930" },
      { guerra: "SD MOTTA", id: "4626338" },
      { guerra: "1º SGT DIEFERSON", id: "2972719" },
      { guerra: "SD CAMACHO", id: "3698696" },
      { guerra: "1º SGT BATISTA", id: "2692449" },
      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }
    ];

    let logado = null;

    const elIdFunc = document.getElementById("idFunc");
    const elBtnEntrar = document.getElementById("btnEntrar");
    const elUserOk = document.getElementById("userOk");
    const elFormBox = document.getElementById("formBox");
    const elVtr = document.getElementById("vtr");
    const elData = document.getElementById("data");
    const elKmIni = document.getElementById("kmIni");
    const elKmFim = document.getElementById("kmFim");
    const elCondutor = document.getElementById("condutor");
    const elBtnSalvar = document.getElementById("btnSalvar");
    const elLista = document.getElementById("lista");
    const elStatusSalvar = document.getElementById("statusSalvar");

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    async function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        elUserOk.innerHTML = `<div class="erro">❌ ID não cadastrada</div>`;
        elFormBox.classList.add("hidden");
        return;
      }

      logado = user;
      elCondutor.value = user.guerra;
      elUserOk.innerHTML = `<div class="ok">✅ ${user.guerra}</div>`;
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }
    }

    async function salvar() {
      if (!logado) {
        elStatusSalvar.innerHTML = `<div class="erro">❌ Faça o login primeiro</div>`;
        return;
      }

      const kmIni = Number(elKmIni.value);
      const kmFim = Number(elKmFim.value);

      if (!elData.value || !elVtr.value || !elCondutor.value) {
        elStatusSalvar.innerHTML = `<div class="erro">❌ Preencha os campos obrigatórios</div>`;
        return;
      }

      if (Number.isNaN(kmIni) || Number.isNaN(kmFim)) {
        elStatusSalvar.innerHTML = `<div class="erro">❌ Informe KM inicial e final</div>`;
        return;
      }

      if (kmFim < kmIni) {
        elStatusSalvar.innerHTML = `<div class="erro">❌ KM final não pode ser menor que o inicial</div>`;
        return;
      }

      elStatusSalvar.innerHTML = `<div class="muted">Salvando...</div>`;

      const { error } = await supabase.from("diario").insert([{
        vtr: elVtr.value,
        data: elData.value,
        kmIni: kmIni,
        kmFim: kmFim,
        condutor: elCondutor.value
      }]);

      if (error) {
        console.error("Erro ao salvar:", error);
        elStatusSalvar.innerHTML = `<div class="erro">❌ Erro ao salvar: ${error.message}</div>`;
        return;
      }

      elStatusSalvar.innerHTML = `<div class="ok">☁️ Salvo com sucesso</div>`;
      elKmIni.value = "";
      elKmFim.value = "";
      await carregar();
    }

    async function carregar() {
      const { data, error } = await supabase
        .from("diario")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("Erro ao carregar:", error);
        elLista.innerHTML = `<div class="erro">❌ Erro ao listar: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        elLista.innerHTML = `<div class="muted">Nenhum registro ainda.</div>`;
        return;
      }

      elLista.innerHTML = data.map(r => `
        <div class="registro">
          <b>${r.vtr}</b><br>
          Data: ${r.data}<br>
          KM: ${r.kmIni} → ${r.kmFim}<br>
          Condutor: ${r.condutor}
        </div>
      `).join("");
    }

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvar);

    elIdFunc.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    carregar();
  </script>
</body>
</html>
