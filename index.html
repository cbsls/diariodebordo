<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚒 Diário de Bordo</title>
  <meta name="theme-color" content="#b71c1c" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background:#e9edf3; margin:0; padding:18px; }
    h1 {
      background:#d51313;
      color:#fff;
      padding:18px;
      border-radius:18px;
      text-align:center;
      margin:0 0 18px 0;
      font-size:28px;
    }
    .card {
      background:#fff;
      border-radius:18px;
      padding:20px;
      margin-bottom:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    label {
      display:block;
      font-size:18px;
      font-weight:bold;
      margin:8px 0 6px;
    }
    input, select {
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #ccc;
      font-size:18px;
      margin-bottom:12px;
      background:#fff;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#d51313;
      color:#fff;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
    }
    button:disabled {
      opacity:.7;
      cursor:wait;
    }
    .hidden { display:none; }
    .ok {
      color:#0a7a28;
      font-weight:bold;
      margin-top:8px;
    }
    .erro {
      color:#b00020;
      font-weight:bold;
      margin-top:8px;
    }
    .muted {
      color:#666;
      font-size:14px;
    }
    .info-vtr {
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
      line-height:1.5;
      font-size:16px;
    }
    .tabs {
      display:flex;
      gap:10px;
      margin-bottom:18px;
    }
    .tab-btn {
      flex:1;
      font-size:18px;
      padding:14px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      background:#bfc7d1;
      color:#24303f;
      font-weight:bold;
    }
    .tab-btn.active {
      background:#d51313;
      color:#fff;
    }
    .registro {
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
      background:#fafafa;
    }
    .registro b {
      font-size:18px;
    }
    .linha-acoes {
      margin-top:10px;
    }
    .btn-pdf {
      background:#0f4c81;
      font-size:16px;
      padding:12px;
    }
    .subtitulo-box {
      margin-top:0;
      margin-bottom:12px;
      font-size:22px;
      color:#24303f;
    }
  </style>
</head>
<body>

  <h1>🚒 Diário de Bordo</h1>

  <div class="tabs">
    <button type="button" class="tab-btn active" id="tabLancamentoBtn">Lançamento</button>
    <button type="button" class="tab-btn" id="tabExportarBtn">Exportar por VTR</button>
  </div>

  <div id="abaLancamento">
    <div class="card">
      <label for="idFunc">ID Func</label>
      <input id="idFunc" type="text" inputmode="numeric" placeholder="Digite sua ID funcional" />
      <button type="button" id="btnEntrar">Entrar</button>
      <div id="userOk"></div>
    </div>

    <div class="card hidden" id="formBox">
      <label for="vtr">VTR</label>
      <select id="vtr">
        <option value="ABT-0535">ABT-0535</option>
        <option value="ABT-7992">ABT-7992</option>
        <option value="AR-426">AR-426</option>
        <option value="ATP-1225">ATP-1225</option>
        <option value="ATP-9316">ATP-9316</option>
      </select>

      <div class="info-vtr" id="infoVtr"></div>

      <label for="data">Data</label>
      <input id="data" type="date" />

      <label for="saida">Saída</label>
      <select id="saida">
        <option value="">Selecione a saída</option>
        <option value="QTL / J4">QTL / J4</option>
        <option value="QTL / 44">QTL / 44</option>
        <option value="QTL / CENTRO">QTL / CENTRO</option>
        <option value="QTL / VISTORIA">QTL / VISTORIA</option>
        <option value="QTL / TRANSPORTE">QTL / TRANSPORTE</option>
        <option value="QTL / PREFEITURA">QTL / PREFEITURA</option>
      </select>

      <label for="retorno">Retorno</label>
      <select id="retorno">
        <option value="">Selecione o retorno</option>
        <option value="J4 / QTL">J4 / QTL</option>
        <option value="44 / QTL">44 / QTL</option>
        <option value="CENTRO / QTL">CENTRO / QTL</option>
        <option value="VISTORIA / QTL">VISTORIA / QTL</option>
        <option value="TRANSPORTE / QTL">TRANSPORTE / QTL</option>
        <option value="PREFEITURA / QTL">PREFEITURA / QTL</option>
      </select>

      <label for="kmIni">KM Inicial</label>
      <input id="kmIni" type="number" inputmode="numeric" />

      <label for="horaPartida">Hora da Partida</label>
      <input id="horaPartida" type="time" />

      <label for="kmFim">KM Final</label>
      <input id="kmFim" type="number" inputmode="numeric" />

      <label for="horaChegada">Hora da Chegada</label>
      <input id="horaChegada" type="time" />

      <label for="condutor">Nome Condutor</label>
      <input id="condutor" readonly />

      <label for="usuario">Nome Usuário</label>
      <select id="usuario">
        <option value="">Selecione o usuário (opcional)</option>
      </select>

      <button type="button" id="btnSalvar">Salvar</button>
      <div id="statusSalvar"></div>
    </div>
  </div>

  <div id="abaExportar" class="hidden">
    <div class="card">
      <h2 class="subtitulo-box">📄 Exportar registros por VTR</h2>

      <label for="filtroVtr">VTR</label>
      <select id="filtroVtr">
        <option value="">Selecione a VTR</option>
        <option value="ABT-0535">ABT-0535</option>
        <option value="ABT-7992">ABT-7992</option>
        <option value="AR-426">AR-426</option>
        <option value="ATP-1225">ATP-1225</option>
        <option value="ATP-9316">ATP-9316</option>
      </select>

      <button type="button" id="btnBuscarVtr">Buscar registros</button>
      <div id="statusBuscaVtr" class="muted"></div>
    </div>

    <div class="card">
      <div id="listaVtr" class="muted">Selecione uma VTR para listar os registros.</div>
    </div>
  </div>

  <script>
    const USUARIOS = [
      { guerra: "1º SGT VICENTE", id: "2614960" },
      { guerra: "2º SGT ANDERSON", id: "2882930" },
      { guerra: "SD MOTTA", id: "4626338" },
      { guerra: "1º SGT DIEFERSON", id: "2972719" },
      { guerra: "SD CAMACHO", id: "3698696" },
      { guerra: "1º SGT BATISTA", id: "2692449" },
      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }
    ];

    const VTRS = {
      "ABT-0535": {
        placa: "JCO-7I27",
        marcamodelo: "ABT VOLKSWAGEN CONSTELLATION",
        orgao: "6º BBM / 3ª CIA / 4º PEL / SÃO LOURENÇO DO SUL"
      },
      "ABT-7992": {
        placa: "JBM-3781",
        marcamodelo: "IVECO 170 E25 - ABT 5000L",
        orgao: "6º BBM / 3ª CIA / 4º PEL / SÃO LOURENÇO DO SUL"
      },
      "AR-426": {
        placa: "JBN7A45",
        marcamodelo: "FORD TRANSIT TCA AMBULÂNCIA",
        orgao: "6º BBM / 3ª CIA / 4º PEL / SÃO LOURENÇO DO SUL"
      },
      "ATP-1225": {
        placa: "TQV-8D59",
        marcamodelo: "PICKUP 4X4",
        orgao: "6º BBM / 3ª CIA / 4º PEL / SÃO LOURENÇO DO SUL"
      },
      "ATP-9316": {
        placa: "IUW6520",
        marcamodelo: "RENAULT DUSTER - 4P - VERMELHA",
        orgao: "6º BBM / 3ª CIA / 4º PEL / SÃO LOURENÇO DO SUL"
      }
    };

    const SUPABASE_URL = "https://nypebmbqcbrvbutamzrh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let logado = null;

    const elIdFunc = document.getElementById("idFunc");
    const elBtnEntrar = document.getElementById("btnEntrar");
    const elUserOk = document.getElementById("userOk");
    const elFormBox = document.getElementById("formBox");
    const elVtr = document.getElementById("vtr");
    const elInfoVtr = document.getElementById("infoVtr");
    const elData = document.getElementById("data");
    const elSaida = document.getElementById("saida");
    const elRetorno = document.getElementById("retorno");
    const elKmIni = document.getElementById("kmIni");
    const elHoraPartida = document.getElementById("horaPartida");
    const elKmFim = document.getElementById("kmFim");
    const elHoraChegada = document.getElementById("horaChegada");
    const elCondutor = document.getElementById("condutor");
    const elUsuario = document.getElementById("usuario");
    const elBtnSalvar = document.getElementById("btnSalvar");
    const elStatusSalvar = document.getElementById("statusSalvar");

    const tabLancamentoBtn = document.getElementById("tabLancamentoBtn");
    const tabExportarBtn = document.getElementById("tabExportarBtn");
    const abaLancamento = document.getElementById("abaLancamento");
    const abaExportar = document.getElementById("abaExportar");

    const elFiltroVtr = document.getElementById("filtroVtr");
    const elBtnBuscarVtr = document.getElementById("btnBuscarVtr");
    const elStatusBuscaVtr = document.getElementById("statusBuscaVtr");
    const elListaVtr = document.getElementById("listaVtr");

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    function esc(texto) {
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function msgOk(el, texto) {
      el.innerHTML = `<div class="ok">${texto}</div>`;
    }

    function msgErro(el, texto) {
      el.innerHTML = `<div class="erro">${texto}</div>`;
    }

    function msgMuted(el, texto) {
      el.innerHTML = `<div class="muted">${texto}</div>`;
    }

    function preencherUsuariosSelect() {
      elUsuario.innerHTML = `<option value="">Selecione o usuário (opcional)</option>` +
        USUARIOS.map(u => `<option value="${esc(u.guerra)}">${esc(u.guerra)}</option>`).join("");
    }

    function atualizarInfoVtr() {
      const dados = VTRS[elVtr.value] || {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      };

      elInfoVtr.innerHTML = `
        <b>PLACA:</b> ${esc(dados.placa)}<br>
        <b>MARCA/MODELO:</b> ${esc(dados.marcamodelo)}<br>
        <b>ÓRGÃO/ENTIDADE:</b> ${esc(dados.orgao)}
      `;
    }

    function abrirAba(nome) {
      if (nome === "lancamento") {
        abaLancamento.classList.remove("hidden");
        abaExportar.classList.add("hidden");
        tabLancamentoBtn.classList.add("active");
        tabExportarBtn.classList.remove("active");
      } else {
        abaLancamento.classList.add("hidden");
        abaExportar.classList.remove("hidden");
        tabLancamentoBtn.classList.remove("active");
        tabExportarBtn.classList.add("active");
      }
    }

    function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        msgErro(elUserOk, "❌ ID não cadastrada");
        elFormBox.classList.add("hidden");
        return;
      }

      logado = user;
      elCondutor.value = user.guerra;
      msgOk(elUserOk, `✅ ${user.guerra}`);
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }

      atualizarInfoVtr();
    }

    async function salvar() {
      if (!logado) {
        msgErro(elStatusSalvar, "❌ Faça o login primeiro");
        return;
      }

      if (!elData.value) {
        msgErro(elStatusSalvar, "❌ Informe a data");
        return;
      }

      if (!elSaida.value.trim()) {
        msgErro(elStatusSalvar, "❌ Informe a saída");
        return;
      }

      if (!elRetorno.value.trim()) {
        msgErro(elStatusSalvar, "❌ Informe o retorno");
        return;
      }

      if (elKmIni.value === "" || elKmFim.value === "") {
        msgErro(elStatusSalvar, "❌ Informe KM inicial e final");
        return;
      }

      if (!elHoraPartida.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da partida");
        return;
      }

      if (!elHoraChegada.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da chegada");
        return;
      }

      const kmIniValor = Number(elKmIni.value);
      const kmFimValor = Number(elKmFim.value);

      if (Number.isNaN(kmIniValor) || Number.isNaN(kmFimValor)) {
        msgErro(elStatusSalvar, "❌ KM inválido");
        return;
      }

      if (kmFimValor < kmIniValor) {
        msgErro(elStatusSalvar, "❌ KM final não pode ser menor que o inicial");
        return;
      }

      const dadosVtr = VTRS[elVtr.value] || {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      };

      elBtnSalvar.disabled = true;
      msgMuted(elStatusSalvar, "Salvando...");

      try {
        const { error } = await supabaseClient
          .from("diario")
          .insert([{
            vtr: elVtr.value,
            placa: dadosVtr.placa,
            marcamodelo: dadosVtr.marcamodelo,
            orgao: dadosVtr.orgao,
            data: elData.value,
            localpartida: elSaida.value.trim(),
            localretorno: elRetorno.value.trim(),
            kmini: kmIniValor,
            horapartida: elHoraPartida.value,
            kmfim: kmFimValor,
            horachegada: elHoraChegada.value,
            condutor: elCondutor.value,
            usuario: elUsuario.value.trim(),
            assinaturacondutor: "",
            assinaturausuario: ""
          }]);

        if (error) {
          msgErro(elStatusSalvar, `❌ Erro ao salvar: ${error.message}`);
          return;
        }

        msgOk(elStatusSalvar, "☁️ Salvo com sucesso");
        elSaida.value = "";
        elRetorno.value = "";
        elKmIni.value = "";
        elHoraPartida.value = "";
        elKmFim.value = "";
        elHoraChegada.value = "";
        elUsuario.value = "";
      } catch (e) {
        console.error(e);
        msgErro(elStatusSalvar, "❌ Falha inesperada ao salvar");
      } finally {
        elBtnSalvar.disabled = false;
      }
    }

    async function buscarRegistrosPorVtr() {
      const vtr = elFiltroVtr.value;

      if (!vtr) {
        msgErro(elStatusBuscaVtr, "❌ Selecione uma VTR");
        msgMuted(elListaVtr, "Selecione uma VTR para listar os registros.");
        return;
      }

      msgMuted(elStatusBuscaVtr, "Buscando...");
      msgMuted(elListaVtr, "Carregando registros...");

      try {
        const { data, error } = await supabaseClient
          .from("diario")
          .select("*")
          .eq("vtr", vtr)
          .order("id", { ascending: false });

        if (error) {
          msgErro(elStatusBuscaVtr, `❌ Erro ao buscar: ${error.message}`);
          msgMuted(elListaVtr, "Falha ao carregar.");
          return;
        }

        msgOk(elStatusBuscaVtr, `✅ ${data.length} registro(s) encontrado(s)`);

        if (!data || data.length === 0) {
          msgMuted(elListaVtr, "Nenhum registro encontrado para esta VTR.");
          return;
        }

        elListaVtr.innerHTML = data.map(r => `
          <div class="registro">
            <b>${esc(r.vtr)}</b><br>
            Data: ${esc(r.data)}<br>
            Saída: ${esc(r.localpartida)}<br>
            Retorno: ${esc(r.localretorno || "")}<br>
            KM: ${esc(r.kmini)} → ${esc(r.kmfim)}<br>
            Hora: ${esc(r.horapartida)} → ${esc(r.horachegada)}<br>
            Condutor: ${esc(r.condutor)}<br>
            Usuário: ${esc(r.usuario || "")}
            <div class="linha-acoes">
              <button class="btn-pdf" type="button" onclick="gerarPDF(${Number(r.id)})">📄 PDF</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        console.error(e);
        msgErro(elStatusBuscaVtr, "❌ Falha inesperada ao buscar");
        msgMuted(elListaVtr, "Falha ao carregar.");
      }
    }

    async function gerarPDF(id) {
      try {
        const { data, error } = await supabaseClient
          .from("diario")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          alert("Erro ao buscar registro.");
          return;
        }

        const w = window.open("", "_blank");
        if (!w) {
          alert("Não foi possível abrir a janela do PDF.");
          return;
        }

        function linhaVazia() {
          return `
            <tr class="linha-dados">
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          `;
        }

        const linhasExtras = Array.from({ length: 13 }, linhaVazia).join("");

        w.document.write(`

              }

                height: 46px;
                line-height: 1.15;
              }

              .linha-dados td {
                height: 34px;
              }

              .w1 { width: 5.34%; }
              .w2 { width: 13.34%; }

          <body>

              <table>
                <colgroup>
                  <col class="w1">

                  <col class="w8">

                  <col class="w10">
                </colgroup>

                <tr class="titulo">
                  <td colspan="10">DIÁRIO DE BORDO FÍSICO</td>
                </tr>

                <tr class="identificacao">
                  <td colspan="3" class="al-esq"><b>PLACA:</b> ${esc(data.placa)}</td>
                  <td colspan="4" class="al-esq"><b>MARCA/MODELO:</b> ${esc(data.marcamodelo)}</td>
                  <td colspan="3" class="al-esq"><b>ÓRGÃO/ENTIDADE:</b> ${esc(data.orgao)}</td>
                </tr>

                <tr class="cabecalho">
                  <td>DATA</td>
                  <td>LOCAL DE PARTIDA</td>
                  <td>KM DO VEÍC. NA PARTIDA</td>
                  <td>HORA DA PARTIDA</td>
                  <td>KM DO VEIC. NO DESTINO</td>

                <tr class="linha-dados">
                  <td>${esc(data.data)}</td>
                  <td>${esc(data.localpartida)}</td>
                  <td>${esc(data.kmini)}</td>
                  <td>${esc(data.horapartida)}</td>
                  <td>${esc(data.kmfim)}</td>
                  <td>${esc(data.horachegada)}</td>
                  <td>${esc(data.condutor)}</td>
                  <td></td>
                  <td>${esc(data.usuario || "")}</td>
                  <td></td>
                </tr>

                ${linhasExtras}
              </table>
            </div>

            <script>
              window.onload = function () {
                window.print();
              };
            <\/script>
          </body>
          </html>
        `);

        w.document.close();
      } catch (e) {
        console.error(e);
        alert("Falha ao gerar PDF.");
      }
    }

    window.gerarPDF = gerarPDF;

    tabLancamentoBtn.addEventListener("click", function() {
      abrirAba("lancamento");
    });

    tabExportarBtn.addEventListener("click", function() {
      abrirAba("exportar");
    });

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvar);
    elVtr.addEventListener("change", atualizarInfoVtr);
    elBtnBuscarVtr.addEventListener("click", buscarRegistrosPorVtr);

    elIdFunc.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });

    elHoraChegada.addEventListener("keydown", function(e) {
      if (e.key === "Enter") salvar();
    });

    if (!elData.value) {
      elData.value = hojeISO();
    }

    preencherUsuariosSelect();
    atualizarInfoVtr();
  </script>
</body>
</html>
