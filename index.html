<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔗 SEU SUPABASE (JÁ CONFIGURADO)
const supabase = window.supabase.createClient(
"https://nypebmbqcbrvbutamzrh.supabase.co",
"sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg"
);

const USUARIOS=[
{guerra:"SD BORGES",id:"3698440"},
{guerra:"1º SGT VICENTE",id:"2614960"},
{guerra:"2º SGT ANDERSON",id:"2882930"}
];

let logado=null;

async function login(){
  const id=idFunc.value;
  const user=USUARIOS.find(u=>u.id===id);

  if(!user) return alert("❌ ID não cadastrada");

  logado=user;
  condutor.value=user.guerra;
  userOk.innerHTML="✅ "+user.guerra;

  formBox.classList.remove("hidden");
}

// 🔥 SALVAR ONLINE
async function salvar(){

  if(Number(kmFim.value)<Number(kmIni.value)){
    return alert("🚫 KM inválido!");
  }

  const registro={
    vtr:vtr.value,
    data:data.value,
    kmIni:kmIni.value,
    kmFim:kmFim.value,
    condutor:condutor.value
  };

  const {error} = await supabase.from("diario").insert([registro]);

  if(error){
    alert("❌ Erro ao salvar");
    console.log(error);
    return;
  }

  alert("☁️ Salvo com sucesso!");
  carregar();
}

// 🔄 CARREGAR DADOS
async function carregar(){

  const {data,error} = await supabase
  .from("diario")
  .select("*")
  .order("id",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  lista.innerHTML="";

  data.forEach(r=>{
    lista.innerHTML+=`
    <div class="registro">
      <b>${r.vtr}</b> - ${r.data}<br>
      KM: ${r.kmIni} → ${r.kmFim}
      <button onclick='pdf(${JSON.stringify(r)})'>📄 PDF</button>
    </div>`;
  });
}

// 📄 PDF MILIMÉTRICO
function pdf(r){

  const w=window.open();

  w.document.write(`
  <style>
  body{font-family:Arial;padding:40px;}
  table{width:100%;border-collapse:collapse;}
  td,th{border:1px solid #000;padding:6px;text-align:center;}
  h2{text-align:center;}
  </style>

  <h2>🚒 DIÁRIO DE BORDO</h2>

  <table>
  <tr><th>VTR</th><th>DATA</th><th>KM INI</th><th>KM FIM</th><th>CONDUTOR</th></tr>
  <tr>
  <td>${r.vtr}</td>
  <td>${r.data}</td>
  <td>${r.kmIni}</td>
  <td>${r.kmFim}</td>
  <td>${r.condutor}</td>
  </tr>
  </table>

  <script>window.print()</script>
  `);
}

// 📊 RELATÓRIO
async function relatorio(){

  const {data} = await supabase.from("diario").select("*");

  let total=0;

  data.forEach(r=>{
    total += Number(r.kmFim) - Number(r.kmIni);
  });

  alert("📊 KM total: "+total);
}

carregar();

</script>
