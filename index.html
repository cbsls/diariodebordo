<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TESTE DIÁRIO DE BORDO V9</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background:#e9edf3; margin:0; padding:18px; }
    h1 {
      background:#d51313; color:#fff; padding:18px; border-radius:18px;
      text-align:center; margin:0 0 18px 0; font-size:28px;
    }
    .card {
      background:#fff; border-radius:18px; padding:20px; margin-bottom:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    label { display:block; font-size:18px; font-weight:bold; margin-bottom:8px; }
    input, select {
      width:100%; padding:16px; border-radius:14px; border:1px solid #ccc;
      font-size:18px; margin-bottom:12px;
    }
    button {
      width:100%; padding:16px; border:none; border-radius:14px;
      background:#d51313; color:#fff; font-size:22px; font-weight:bold;
      cursor:pointer;
    }
    .hidden { display:none; }
    .ok { color:#0a7a28; font-weight:bold; margin-top:8px; }
    .erro { color:#b00020; font-weight:bold; margin-top:8px; }
    .muted { color:#666; }
    .registro {
      border:1px solid #ddd; border-radius:14px; padding:14px; margin-bottom:10px;
      background:#fafafa;
    }
  </style>
</head>
<body>

  <h1>🚒 TESTE DIÁRIO DE BORDO V9</h1>

  <div class="card">
    <div class="ok">VERSÃO DE TESTE V9 CARREGADA</div>
  </div>

  <div class="card">
    <label for="idFunc">ID Func</label>
    <input id="idFunc" type="text" value="3698440" />
    <button type="button" id="btnEntrar">Entrar</button>
    <div id="userOk"></div>
  </div>

  <div class="card hidden" id="formBox">
    <label for="vtr">VTR</label>
    <select id="vtr">
      <option>AR-426</option>
      <option>ABT-0535</option>
      <option>ABT-7992</option>
    </select>

    <label for="data">Data</label>
    <input id="data" type="date" />

    <label for="kmIni">KM Inicial</label>
    <input id="kmIni" type="number" />

    <label for="kmFim">KM Final</label>
    <input id="kmFim" type="number" />

    <label for="condutor">Condutor</label>
    <input id="condutor" readonly />

    <button type="button" id="btnSalvar">Salvar teste</button>
    <div id="statusSalvar"></div>
  </div>

  <div class="card">
    <h2>Registros</h2>
    <div id="lista" class="muted">Nenhum registro ainda.</div>
  </div>

  <script>
    const USUARIOS = [
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "1º SGT VICENTE", id: "2614960" }
    ];

    const elIdFunc = document.getElementById("idFunc");
    const elBtnEntrar = document.getElementById("btnEntrar");
    const elUserOk = document.getElementById("userOk");
    const elFormBox = document.getElementById("formBox");
    const elCondutor = document.getElementById("condutor");
    const elBtnSalvar = document.getElementById("btnSalvar");
    const elStatusSalvar = document.getElementById("statusSalvar");
    const elData = document.getElementById("data");

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        elUserOk.innerHTML = '<div class="erro">❌ ID não cadastrada</div>';
        elFormBox.classList.add("hidden");
        return;
      }

      elCondutor.value = user.guerra;
      elUserOk.innerHTML = '<div class="ok">✅ ' + user.guerra + '</div>';
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }
    }

    function salvarTeste() {
      elStatusSalvar.innerHTML = '<div class="ok">✅ Botão salvar funcionando</div>';
    }

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvarTeste);

    elIdFunc.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
