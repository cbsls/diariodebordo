<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚒 Diário de Bordo</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef3f8;
      margin:0;
      padding:10px;
    }
    h1{
      background:#b71c1c;
      color:#fff;
      padding:12px;
      border-radius:10px;
      text-align:center;
    }
    .card{
      background:#fff;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    input, select{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }
    button{
      padding:10px;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }
    .btn{
      background:#b71c1c;
      color:#fff;
      width:100%;
    }
    .registro{
      border:1px solid #ddd;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }
    .hidden{
      display:none;
    }
    .linha-botoes{
      display:flex;
      gap:8px;
      margin-top:8px;
    }
    .linha-botoes button{
      flex:1;
    }
  </style>
</head>
<body>

  <h1>🚒 Diário de Bordo</h1>

  <div class="card">
    <label for="idFunc">ID Func</label>
    <input id="idFunc" type="text" placeholder="Digite sua ID Funcional">
    <button class="btn" onclick="login()">Entrar</button>
    <div id="userOk" style="margin-top:8px;font-weight:bold;"></div>
  </div>

  <div class="card hidden" id="formBox">
    <label for="vtr">VTR</label>
    <select id="vtr">
      <option>AR-426</option>
      <option>ABT-0535</option>
      <option>ABT-7992</option>
      <option>ATP-1225</option>
      <option>ATP-370</option>
      <option>ATP-9316</option>
    </select>

    <label for="data">Data</label>
    <input type="date" id="data">

    <label for="kmIni">KM Inicial</label>
    <input type="number" id="kmIni" placeholder="Ex: 125000">

    <label for="kmFim">KM Final</label>
    <input type="number" id="kmFim" placeholder="Ex: 125030">

    <label for="condutor">Condutor</label>
    <input id="condutor" readonly>

    <div class="linha-botoes">
      <button class="btn" onclick="salvar()">Salvar</button>
      <button class="btn" onclick="relatorio()">Relatório</button>
    </div>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="lista"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://nypebmbqcbrvbutamzrh.supabase.co",
      "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg"
    );

    const USUARIOS = [
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "1º SGT VICENTE", id: "2614960" },
      { guerra: "2º SGT ANDERSON", id: "2882930" },
      { guerra: "SD MOTTA", id: "4626338" },
      { guerra: "1º SGT DIEFERSON", id: "2972719" },
      { guerra: "SD CAMACHO", id: "3698696" },
      { guerra: "1º SGT BATISTA", id: "2692449" },
      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }
    ];

    let logado = null;

    function login() {
      const id = document.getElementById("idFunc").value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        alert("❌ ID não cadastrada");
        return;
      }

      logado = user;
      document.getElementById("condutor").value = user.guerra;
      document.getElementById("userOk").innerHTML = "✅ " + user.guerra;
      document.getElementById("formBox").classList.remove("hidden");
    }

    async function salvar() {
      const vtr = document.getElementById("vtr").value;
      const data = document.getElementById("data").value;
      const kmIni = Number(document.getElementById("kmIni").value);
      const kmFim = Number(document.getElementById("kmFim").value);
      const condutor = document.getElementById("condutor").value;

      if (!logado) {
        alert("Faça login primeiro.");
        return;
      }

      if (!data) {
        alert("Informe a data.");
        return;
      }

      if (!kmIni && kmIni !== 0) {
        alert("Informe o KM inicial.");
        return;
      }

      if (!kmFim && kmFim !== 0) {
        alert("Informe o KM final.");
        return;
      }

      if (kmFim < kmIni) {
        alert("🚫 KM final não pode ser menor que KM inicial.");
        return;
      }

      const { error } = await supabase
        .from("diario")
        .insert([{
          vtr,
          data,
          kmIni,
          kmFim,
          condutor
        }]);

      if (error) {
        console.error(error);
        alert("❌ Erro ao salvar no Supabase.");
        return;
      }

      alert("☁️ Salvo com sucesso!");
      document.getElementById("kmIni").value = "";
      document.getElementById("kmFim").value = "";
      carregar();
    }

    async function carregar() {
      const lista = document.getElementById("lista");
      lista.innerHTML = "Carregando...";

      const { data, error } = await supabase
        .from("diario")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error(error);
        lista.innerHTML = "Erro ao carregar registros.";
        return;
      }

      if (!data || data.length === 0) {
        lista.innerHTML = "Nenhum registro encontrado.";
        return;
      }

      lista.innerHTML = "";

      data.forEach(r => {
        lista.innerHTML += `
          <div class="registro">
            <b>${r.vtr}</b> - ${r.data}<br>
            KM: ${r.kmIni} → ${r.kmFim}<br>
            Condutor: ${r.condutor}
          </div>
        `;
      });
    }

    async function relatorio() {
      const { data, error } = await supabase
        .from("diario")
        .select("*");

      if (error) {
        console.error(error);
        alert("Erro ao gerar relatório.");
        return;
      }

      let total = 0;
      data.forEach(r => {
        total += Number(r.kmFim) - Number(r.kmIni);
      });

      alert("📊 KM total: " + total);
    }

    carregar();
  </script>

</body>
</html>
