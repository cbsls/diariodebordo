<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚒 Diário de Bordo</title>
  <meta name="theme-color" content="#b71c1c" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background:#e9edf3; margin:0; padding:18px; }
    h1 {
      background:#d51313; color:#fff; padding:18px; border-radius:18px;
      text-align:center; margin:0 0 18px 0; font-size:28px;
    }
    .card {
      background:#fff; border-radius:18px; padding:20px; margin-bottom:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    label {
      display:block; font-size:18px; font-weight:bold; margin:8px 0 6px;
    }
    input, select {
      width:100%; padding:16px; border-radius:14px; border:1px solid #ccc;
      font-size:18px; margin-bottom:12px; background:#fff;
    }
    button {
      width:100%; padding:16px; border:none; border-radius:14px;
      background:#d51313; color:#fff; font-size:22px; font-weight:bold;
      cursor:pointer;
    }
    button:disabled { opacity:.7; cursor:wait; }
    .hidden { display:none; }
    .ok { color:#0a7a28; font-weight:bold; margin-top:8px; }
    .erro { color:#b00020; font-weight:bold; margin-top:8px; }
    .muted { color:#666; font-size:14px; }
    .registro {
      border:1px solid #ddd; border-radius:14px; padding:14px; margin-bottom:10px;
      background:#fafafa;
    }
    .registro b { font-size:18px; }
    .linha-acoes { margin-top:10px; }
    .btn-pdf {
      background:#0f4c81;
      font-size:16px;
      padding:12px;
    }
  </style>
</head>
<body>

  <h1>🚒 Diário de Bordo</h1>

  <div class="card">
    <label for="idFunc">ID Func</label>
    <input id="idFunc" type="text" inputmode="numeric" placeholder="Digite sua ID funcional" />
    <button type="button" id="btnEntrar">Entrar</button>
    <div id="userOk"></div>
  </div>

  <div class="card hidden" id="formBox">
    <label for="vtr">VTR</label>
    <select id="vtr">
      <option value="AR-426">AR-426</option>
      <option value="ABT-0535">ABT-0535</option>
      <option value="ABT-7992">ABT-7992</option>
      <option value="ATP-1225">ATP-1225</option>
      <option value="ATP-370">ATP-370</option>
      <option value="ATP-9316">ATP-9316</option>
    </select>

    <label for="data">Data</label>
    <input id="data" type="date" />

    <label for="kmIni">KM Inicial</label>
    <input id="kmIni" type="number" inputmode="numeric" />

    <label for="kmFim">KM Final</label>
    <input id="kmFim" type="number" inputmode="numeric" />

    <label for="condutor">Condutor</label>
    <input id="condutor" readonly />

    <button type="button" id="btnSalvar">Salvar</button>
    <div id="statusSalvar"></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">Registros</h2>
    <div id="lista" class="muted">Carregando...</div>
  </div>

  <script>
    const USUARIOS = [
      { guerra: "1º SGT VICENTE", id: "2614960" },
      { guerra: "2º SGT ANDERSON", id: "2882930" },
      { guerra: "SD MOTTA", id: "4626338" },
      { guerra: "1º SGT DIEFERSON", id: "2972719" },
      { guerra: "SD CAMACHO", id: "3698696" },
      { guerra: "1º SGT BATISTA", id: "2692449" },
      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }
    ];

    const SUPABASE_URL = "https://nypebmbqcbrvbutamzrh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg";

    let logado = null;
    let supabase = null;

    const elIdFunc = document.getElementById("idFunc");
    const elBtnEntrar = document.getElementById("btnEntrar");
    const elUserOk = document.getElementById("userOk");
    const elFormBox = document.getElementById("formBox");
    const elVtr = document.getElementById("vtr");
    const elData = document.getElementById("data");
    const elKmIni = document.getElementById("kmIni");
    const elKmFim = document.getElementById("kmFim");
    const elCondutor = document.getElementById("condutor");
    const elBtnSalvar = document.getElementById("btnSalvar");
    const elStatusSalvar = document.getElementById("statusSalvar");
    const elLista = document.getElementById("lista");

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    function esc(texto) {
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function msgOk(el, texto) {
      el.innerHTML = `<div class="ok">${texto}</div>`;
    }

    function msgErro(el, texto) {
      el.innerHTML = `<div class="erro">${texto}</div>`;
    }

    function msgMuted(el, texto) {
      el.innerHTML = `<div class="muted">${texto}</div>`;
    }

    function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        msgErro(elUserOk, "❌ ID não cadastrada");
        elFormBox.classList.add("hidden");
        return;
      }

      logado = user;
      elCondutor.value = user.guerra;
      msgOk(elUserOk, `✅ ${user.guerra}`);
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }
    }

    async function salvar() {
      if (!logado) {
        msgErro(elStatusSalvar, "❌ Faça o login primeiro");
        return;
      }

      if (!supabase) {
        msgErro(elStatusSalvar, "❌ Supabase não carregou");
        return;
      }

      if (!elData.value) {
        msgErro(elStatusSalvar, "❌ Informe a data");
        return;
      }

      if (elKmIni.value === "" || elKmFim.value === "") {
        msgErro(elStatusSalvar, "❌ Informe KM inicial e final");
        return;
      }

      const kmIni = Number(elKmIni.value);
      const kmFim = Number(elKmFim.value);

      if (Number.isNaN(kmIni) || Number.isNaN(kmFim)) {
        msgErro(elStatusSalvar, "❌ KM inválido");
        return;
      }

      if (kmFim < kmIni) {
        msgErro(elStatusSalvar, "❌ KM final não pode ser menor que o inicial");
        return;
      }

      elBtnSalvar.disabled = true;
      msgMuted(elStatusSalvar, "Salvando...");

      try {
        const { error } = await supabase
          .from("diario")
          .insert([{
            vtr: elVtr.value,
            data: elData.value,
            kmIni: kmIni,
            kmFim: kmFim,
            condutor: elCondutor.value
          }]);

        if (error) {
          msgErro(elStatusSalvar, `❌ Erro ao salvar: ${error.message}`);
          return;
        }

        msgOk(elStatusSalvar, "☁️ Salvo com sucesso");
        elKmIni.value = "";
        elKmFim.value = "";
        await carregar();
      } catch (e) {
        console.error(e);
        msgErro(elStatusSalvar, "❌ Falha inesperada ao salvar");
      } finally {
        elBtnSalvar.disabled = false;
      }
    }

    async function carregar() {
      if (!supabase) {
        msgErro(elLista, "❌ Supabase não carregou");
        return;
      }

      try {
        const { data, error } = await supabase
          .from("diario")
          .select("*")
          .order("id", { ascending: false });

        if (error) {
          msgErro(elLista, `❌ Erro ao listar: ${error.message}`);
          return;
        }

        if (!data || data.length === 0) {
          msgMuted(elLista, "Nenhum registro ainda.");
          return;
        }

        elLista.innerHTML = data.map(r => `
          <div class="registro">
            <b>${esc(r.vtr)}</b><br>
            Data: ${esc(r.data)}<br>
            KM: ${esc(r.kmIni)} → ${esc(r.kmFim)}<br>
            Condutor: ${esc(r.condutor)}
            <div class="linha-acoes">
              <button class="btn-pdf" type="button" onclick="gerarPDF(${Number(r.id)})">📄 PDF</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        console.error(e);
        msgErro(elLista, "❌ Falha inesperada ao listar");
      }
    }

    async function gerarPDF(id) {
      if (!supabase) {
        alert("Supabase não carregou.");
        return;
      }

      try {
        const { data, error } = await supabase
          .from("diario")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          alert("Erro ao buscar registro.");
          return;
        }

        const w = window.open("", "_blank");
        if (!w) {
          alert("Não foi possível abrir a janela do PDF.");
          return;
        }

        w.document.write(`
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>PDF Diário de Bordo</title>
            <style>
              body { font-family: Arial, Helvetica, sans-serif; padding: 40px; color: #000; }
              h2 { text-align: center; margin-bottom: 25px; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 14px; }
            </style>
          </head>
          <body>
            <h2>DIÁRIO DE BORDO</h2>
            <table>
              <tr>
                <th>VTR</th>
                <th>DATA</th>
                <th>KM INICIAL</th>
                <th>KM FINAL</th>
                <th>CONDUTOR</th>
              </tr>
              <tr>
                <td>${esc(data.vtr)}</td>
                <td>${esc(data.data)}</td>
                <td>${esc(data.kmIni)}</td>
                <td>${esc(data.kmFim)}</td>
                <td>${esc(data.condutor)}</td>
              </tr>
            </table>
            <script>
              window.onload = function(){ window.print(); };
            <\/script>
          </body>
          </html>
        `);
        w.document.close();
      } catch (e) {
        console.error(e);
        alert("Falha ao gerar PDF.");
      }
    }

    window.gerarPDF = gerarPDF;

    async function iniciar() {
      if (!elData.value) {
        elData.value = hojeISO();
      }

      try {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        script.onload = async function () {
          if (window.supabase && typeof window.supabase.createClient === "function") {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await carregar();
          } else {
            msgErro(elLista, "❌ Biblioteca Supabase não disponível");
          }
        };
        script.onerror = function () {
          msgErro(elLista, "❌ Não foi possível carregar a biblioteca Supabase");
        };
        document.head.appendChild(script);
      } catch (e) {
        console.error(e);
        msgErro(elLista, "❌ Erro ao iniciar o sistema");
      }
    }

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvar);

    elIdFunc.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });

    elKmFim.addEventListener("keydown", function(e) {
      if (e.key === "Enter") salvar();
    });

    iniciar();
  </script>
</body>
</html>
