<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚒 Diário de Bordo</title>
  <meta name="theme-color" content="#b71c1c" />
  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { background:#e9edf3; margin:0; padding:18px 18px 90px 18px; }
    h1 {
      background:#d51313;
      color:#fff;
      padding:18px;
      border-radius:18px;
      text-align:center;
      margin:0 0 18px 0;
      font-size:28px;
    }
    .card {
      background:#fff;
      border-radius:18px;
      padding:20px;
      margin-bottom:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    label {
      display:block;
      font-size:18px;
      font-weight:bold;
      margin:8px 0 6px;
    }
    input, select, textarea {
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #ccc;
      font-size:18px;
      margin-bottom:12px;
      background:#fff;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#d51313;
      color:#fff;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
    }
    button:disabled {
      opacity:.7;
      cursor:wait;
    }
    .hidden { display:none !important; }
    .ok {
      color:#0a7a28;
      font-weight:bold;
      margin-top:8px;
    }
    .erro {
      color:#b00020;
      font-weight:bold;
      margin-top:8px;
    }
    .muted {
      color:#666;
      font-size:14px;
    }
    .info-vtr {
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
      line-height:1.5;
      font-size:16px;
    }
    .subtitulo-box {
      margin-top:0;
      margin-bottom:12px;
      font-size:22px;
      color:#24303f;
    }
    .registro, .vtr-item {
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
      background:#fafafa;
    }
    .registro b, .vtr-item b {
      font-size:18px;
    }
    .linha-acoes {
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn-pdf {
      background:#0f4c81;
      font-size:16px;
      padding:12px;
    }
    .btn-edit {
      background:#6d4c41;
      font-size:16px;
      padding:12px;
    }
    .btn-save {
      background:#2e7d32;
      font-size:16px;
      padding:12px;
    }
    .btn-cancel {
      background:#757575;
      font-size:16px;
      padding:12px;
    }
    .odometro-box {
      background:#111;
      color:#19ff63;
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
      border:2px solid #333;
    }
    .odometro-titulo {
      font-size:14px;
      color:#b8ffcd;
      margin-bottom:6px;
    }
    .odometro-valor {
      font-family: "Courier New", Courier, monospace;
      font-size:30px;
      font-weight:bold;
      letter-spacing:2px;
    }
    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .rodape-tabs {
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#ffffffee;
      backdrop-filter: blur(6px);
      border-top:1px solid #d8dde4;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      display:flex;
      gap:10px;
      z-index:999;
      box-shadow:0 -2px 12px rgba(0,0,0,.08);
    }
    .rodape-btn {
      flex:1;
      border:none;
      border-radius:12px;
      padding:12px 10px;
      font-size:14px;
      font-weight:bold;
      background:#c7d0da;
      color:#24303f;
      cursor:pointer;
    }
    .rodape-btn.active {
      background:#d51313;
      color:#fff;
    }
    .btn-odometro-discreto {
      width:auto;
      display:inline-block;
      padding:8px 12px;
      font-size:13px;
      border-radius:10px;
      background:#4b5563;
      margin-bottom:10px;
    }
    @media (max-width: 700px) {
      .grid-2 {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

    function hojeISO() {
      const d = new Date();
      const ano = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${ano}-${mes}-${dia}`;
    }

    function esc(texto) {
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function msgOk(el, texto) {
      el.innerHTML = `<div class="ok">${texto}</div>`;
    }

    function msgErro(el, texto) {
      el.innerHTML = `<div class="erro">${texto}</div>`;
    }

    function msgMuted(el, texto) {
      el.innerHTML = `<div class="muted">${texto}</div>`;
    }

    function formatarOdometro(valor) {
      const n = Number(valor || 0);
      return String(Math.max(0, n)).padStart(6, "0");
    }

    function nomeMesNumero(numero) {
      const nomes = [
        "", "JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO",
        "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"
      ];
      return nomes[Number(numero)] || "";
    }

    function preencherAnos() {
      const anoAtual = new Date().getFullYear();
      let html = "";
      for (let ano = anoAtual - 2; ano <= anoAtual + 2; ano++) {
        html += `<option value="${ano}" ${ano === anoAtual ? "selected" : ""}>${ano}</option>`;
      }
      elFiltroAno.innerHTML = html;
    }

    function carregarCadastroVtrs() {
      try {
        const salvo = localStorage.getItem("diario_vtrs_cadastro");
        if (!salvo) return JSON.parse(JSON.stringify(VTRS_INICIAIS));
        const parsed = JSON.parse(salvo);
        return { ...JSON.parse(JSON.stringify(VTRS_INICIAIS)), ...parsed };
      } catch {
        return JSON.parse(JSON.stringify(VTRS_INICIAIS));
      }
    }

    function salvarCadastroVtrs() {
      localStorage.setItem("diario_vtrs_cadastro", JSON.stringify(VTRS));
    }

    function chaveOdometro(vtr) {
      return `diario_odometro_${vtr}`;
    }

    function obterOdometroManual(vtr) {
      const valor = localStorage.getItem(chaveOdometro(vtr));
      return valor ? Number(valor) : null;
    }

    function salvarOdometroManual(vtr, km) {
      localStorage.setItem(chaveOdometro(vtr), String(km));
    }

            </div>

            <div id="edit_${itemId}" class="hidden">

              <label>Órgão/Entidade</label>

              <label>Status</label>

              <label>Descrição</label>
              <textarea id="descricao_${itemId}" rows="3">${esc(v.descricao || "")}</textarea>

              <label>Ano</label>

    function abrirAba(nome) {
      abaLancamento.classList.add("hidden");
      abaExportar.classList.add("hidden");
      abaCadastro.classList.add("hidden");

      tabLancamentoBtn.classList.remove("active");
      tabExportarBtn.classList.remove("active");

        abaLancamento.classList.remove("hidden");
        tabLancamentoBtn.classList.add("active");
      } else if (nome === "exportar") {
        abaExportar.classList.remove("hidden");
        tabExportarBtn.classList.add("active");
      } else {
        abaCadastro.classList.remove("hidden");
        tabCadastroBtn.classList.add("active");
      }
    }

    function login() {
      const id = elIdFunc.value.trim();
      const user = USUARIOS.find(u => u.id === id);

      if (!user) {
        msgErro(elUserOk, "❌ ID não cadastrada");
        elFormBox.classList.add("hidden");
        return;
      }

      logado = user;
      elCondutor.value = user.guerra;
      msgOk(elUserOk, `✅ ${user.guerra}`);
      elFormBox.classList.remove("hidden");

      if (!elData.value) {
        elData.value = hojeISO();
      }

      atualizarInfoVtr();
      atualizarKmBaseDaVtr();
    }

    async function obterUltimoRegistroDaVtr(vtr) {
      const { data, error } = await supabaseClient
        .from("diario")
        .select("*")
        .eq("vtr", vtr)
        .order("data", { ascending: false })
        .order("id", { ascending: false })
        .limit(1);

      if (error) throw error;
      return data && data.length ? data[0] : null;
    }

    async function atualizarKmBaseDaVtr() {
      const vtr = elVtr.value;
      if (!vtr) return;

      try {
        msgMuted(elStatusOdometro, "Consultando KM atual...");
        const ultimo = await obterUltimoRegistroDaVtr(vtr);
        const kmManual = obterOdometroManual(vtr);
        const kmFinalBanco = ultimo && ultimo.kmfim != null ? Number(ultimo.kmfim) : null;
        const kmBase = kmFinalBanco != null ? kmFinalBanco : (kmManual != null ? kmManual : 0);

        elOdometroValor.textContent = formatarOdometro(kmBase);
        elKmIni.value = kmBase || "";
        msgMuted(elStatusOdometro, "KM atual carregada.");
      } catch (e) {
        console.error(e);
        const kmManual = obterOdometroManual(vtr);
        const kmBase = kmManual != null ? kmManual : 0;
        elOdometroValor.textContent = formatarOdometro(kmBase);
        elKmIni.value = kmBase || "";
        msgErro(elStatusOdometro, "⚠️ Usando KM do odômetro local.");
      }
    }

    async function editarOdometroAdmin() {
      const vtr = elVtr.value;
      if (!vtr) {
        msgErro(elStatusOdometro, "❌ Selecione uma VTR.");
        return;
      }

      const senha = prompt("Senha admin:");
      if (senha !== ADMIN_SENHA) {
        msgErro(elStatusOdometro, "❌ Senha inválida.");
        return;
      }

      const atual = elOdometroValor.textContent.replace(/\D/g, "") || "0";
      const novo = prompt(`Informe a KM atual da ${vtr}:`, String(Number(atual)));
      if (novo === null) return;

      const km = Number(novo);
      if (Number.isNaN(km) || km < 0) {
        msgErro(elStatusOdometro, "❌ KM inválida.");
        return;
      }

      salvarOdometroManual(vtr, km);
      elOdometroValor.textContent = formatarOdometro(km);
      elKmIni.value = km;
      msgOk(elStatusOdometro, "✅ KM atualizada.");
    }

    function controlarCamposSaida() {
      if (elSaidaSelect.value === "OUTRO") {
        elSaidaOutro.classList.remove("hidden");
      } else {
        elSaidaOutro.classList.add("hidden");
        elSaidaOutro.value = "";
      }
    }

    function controlarCamposRetorno() {
      if (elRetornoSelect.value === "OUTRO") {
        elRetornoOutro.classList.remove("hidden");
      } else {
        elRetornoOutro.classList.add("hidden");
        elRetornoOutro.value = "";
      }
    }

    function aplicarRetornoAutomatico() {
      controlarCamposSaida();

      if (elSaidaSelect.value && elSaidaSelect.value !== "OUTRO") {
        const retorno = MAPA_RETORNO[elSaidaSelect.value];
        if (retorno) {
          elRetornoSelect.value = retorno;
          controlarCamposRetorno();
        }
      }
    }

    function obterSaidaFinal() {
      if (elSaidaSelect.value === "OUTRO") return elSaidaOutro.value.trim();
      return elSaidaSelect.value.trim();
    }

    function obterRetornoFinal() {
      if (elRetornoSelect.value === "OUTRO") return elRetornoOutro.value.trim();
      return elRetornoSelect.value.trim();
    }

    async function salvar() {
      if (!logado) {
        msgErro(elStatusSalvar, "❌ Faça o login primeiro");
        return;
      }

      const saidaFinal = obterSaidaFinal();
      const retornoFinal = obterRetornoFinal();

      if (!elData.value) {
        msgErro(elStatusSalvar, "❌ Informe a data");
        return;
      }

      if (!saidaFinal) {
        msgErro(elStatusSalvar, "❌ Informe a saída");
        return;
      }

      if (!retornoFinal) {
        msgErro(elStatusSalvar, "❌ Informe o retorno");
        return;
      }

      if (elKmIni.value === "" || elKmFim.value === "") {
        msgErro(elStatusSalvar, "❌ Informe KM inicial e final");
        return;
      }

      if (!elHoraPartida.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da partida");
        return;
      }

      if (!elHoraChegada.value) {
        msgErro(elStatusSalvar, "❌ Informe a hora da chegada");
        return;
      }

      const kmIniValor = Number(elKmIni.value);
      const kmFimValor = Number(elKmFim.value);

      if (Number.isNaN(kmIniValor) || Number.isNaN(kmFimValor)) {
        msgErro(elStatusSalvar, "❌ KM inválido");
        return;
      }

      if (kmFimValor < kmIniValor) {
        msgErro(elStatusSalvar, "❌ KM final não pode ser menor que o inicial");
        return;
      }

      const dadosVtr = VTRS[elVtr.value] || {
        placa: "NÃO CADASTRADO",
        marcamodelo: "NÃO CADASTRADO",
        orgao: "CBMRS CB SLS"
      };

      elBtnSalvar.disabled = true;
      msgMuted(elStatusSalvar, "Salvando...");

      try {
        const { error } = await supabaseClient
          .from("diario")
          .insert([{
            vtr: elVtr.value,
            placa: dadosVtr.placa,
            marcamodelo: dadosVtr.marcamodelo,
            orgao: dadosVtr.orgao,
            data: elData.value,
            localpartida: saidaFinal,
            localretorno: retornoFinal,
            kmini: kmIniValor,
            horapartida: elHoraPartida.value,
            kmfim: kmFimValor,
            horachegada: elHoraChegada.value,
            condutor: elCondutor.value,
            usuario: elUsuario.value.trim(),
            assinaturacondutor: "",
            assinaturausuario: ""
          }]);

        if (error) {
          msgErro(elStatusSalvar, `❌ Erro ao salvar: ${error.message}`);
          return;
        }

        salvarOdometroManual(elVtr.value, kmFimValor);

        msgOk(elStatusSalvar, "☁️ Salvo com sucesso");
        elSaidaSelect.value = "";
        elSaidaOutro.value = "";
        elSaidaOutro.classList.add("hidden");
        elRetornoSelect.value = "";
        elRetornoOutro.value = "";
        elRetornoOutro.classList.add("hidden");
        elKmIni.value = kmFimValor;
        elHoraPartida.value = "";
        elKmFim.value = "";
        elHoraChegada.value = "";
        elUsuario.value = "";
        elOdometroValor.textContent = formatarOdometro(kmFimValor);
      } catch (e) {
        console.error(e);
        msgErro(elStatusSalvar, "❌ Falha inesperada ao salvar");
      } finally {
        elBtnSalvar.disabled = false;
      }
    }

    async function buscarRegistrosPorVtr() {
      const vtr = elFiltroVtr.value;
      const mes = Number(elFiltroMes.value);
      const ano = Number(elFiltroAno.value);

      if (!vtr) {
        msgErro(elStatusBuscaVtr, "❌ Selecione uma VTR");
        msgMuted(elListaVtr, "Selecione VTR, mês e ano para listar os registros.");
        return;
      }

      const inicio = `${ano}-${String(mes).padStart(2, "0")}-01`;
      const ultimoDia = new Date(ano, mes, 0).getDate();
      const fim = `${ano}-${String(mes).padStart(2, "0")}-${String(ultimoDia).padStart(2, "0")}`;

      msgMuted(elStatusBuscaVtr, "Buscando...");
      msgMuted(elListaVtr, "Carregando registros...");

      try {
        const { data, error } = await supabaseClient
          .from("diario")
          .select("*")
          .eq("vtr", vtr)
          .gte("data", inicio)
          .lte("data", fim)
          .order("data", { ascending: true })
          .order("id", { ascending: true });

        if (error) {
          msgErro(elStatusBuscaVtr, `❌ Erro ao buscar: ${error.message}`);
          msgMuted(elListaVtr, "Falha ao carregar.");
          return;
        }

        registrosFiltrados = data || [];
        const referencia = `${nomeMesNumero(mes)} ${ano}`;

        msgOk(elStatusBuscaVtr, `✅ ${registrosFiltrados.length} registro(s) encontrado(s) em ${referencia}`);

        if (!registrosFiltrados.length) {
          msgMuted(elListaVtr, "Nenhum registro encontrado para esta VTR neste mês.");
          return;
        }

        elListaVtr.innerHTML = registrosFiltrados.map(r => `
          <div class="registro">
            <b>${esc(r.vtr)}</b><br>
            Data: ${esc(r.data)}<br>
            Saída: ${esc(r.localpartida)}<br>
            Retorno: ${esc(r.localretorno || "")}<br>
            KM: ${esc(r.kmini)} → ${esc(r.kmfim)}<br>
            Hora: ${esc(r.horapartida)} → ${esc(r.horachegada)}<br>
            Condutor: ${esc(r.condutor)}<br>
            Usuário: ${esc(r.usuario || "")}
          </div>
        `).join("");
      } catch (e) {
        console.error(e);
        msgErro(elStatusBuscaVtr, "❌ Falha inesperada ao buscar");
        msgMuted(elListaVtr, "Falha ao carregar.");
      }
    }

    function quebrarEmPaginas(registros, porPagina) {
      const paginas = [];
      for (let i = 0; i < registros.length; i += porPagina) {
        paginas.push(registros.slice(i, i + porPagina));
      }
      return paginas.length ? paginas : [[]];
    }

    function gerarLinhasTabelaPdf(registros, linhasPorPagina = 14) {
      const linhas = registros.map(r => `
        <tr class="linha-dados">
          <td>${esc(r.data)}</td>
          <td>${esc(r.localpartida)}</td>
          <td>${esc(r.kmini)}</td>
          <td>${esc(r.horapartida)}</td>
          <td>${esc(r.kmfim)}</td>
          <td>${esc(r.horachegada)}</td>
          <td>${esc(r.condutor)}</td>
          <td></td>
          <td>${esc(r.usuario || "")}</td>
          <td></td>
        </tr>
      `).join("");

      const faltantes = Math.max(0, linhasPorPagina - registros.length);
      const vazias = Array.from({ length: faltantes }, () => `
        <tr class="linha-dados">
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      `).join("");

      return linhas + vazias;
    }

    function gerarBlocoPaginaPdf(vtr, referencia, dadosVtr, registrosPagina, numeroPagina, totalPaginas) {
      const linhasTabela = gerarLinhasTabelaPdf(registrosPagina, 14);

      return `
        <div class="folha ${numeroPagina < totalPaginas ? 'quebra-pagina' : ''}">
          <table>
            <colgroup>
              <col class="w1">
              <col class="w2">
              <col class="w3">
              <col class="w4">
              <col class="w5">
              <col class="w6">
              <col class="w7">
              <col class="w8">
              <col class="w9">
              <col class="w10">
            </colgroup>

            <tr class="titulo">
              <td colspan="10">DIÁRIO DE BORDO FÍSICO</td>
            </tr>

            <tr class="subref">
              <td colspan="10">${esc(vtr)} - ${esc(referencia)} - PÁGINA ${numeroPagina}/${totalPaginas}</td>
            </tr>

            <tr class="identificacao">
              <td colspan="3" class="al-esq"><b>PLACA:</b> ${esc(dadosVtr.placa || "")}</td>
              <td colspan="4" class="al-esq"><b>MARCA/MODELO:</b> ${esc(dadosVtr.marcamodelo || "")}</td>
              <td colspan="3" class="al-esq"><b>ÓRGÃO/ENTIDADE:</b> ${esc(dadosVtr.orgao || "")}</td>
            </tr>

            <tr class="cabecalho">
              <td>DATA</td>
              <td>LOCAL DE PARTIDA</td>
              <td>KM DO VEÍC. NA PARTIDA</td>
              <td>HORA DA PARTIDA</td>
              <td>KM DO VEIC. NO DESTINO</td>
              <td>HORA DA CHEGADA</td>
              <td>NOME CONDUTOR</td>
              <td>ASSINATURA CONDUTOR</td>
              <td>NOME USUÁRIO</td>
              <td>ASSINATURA USUÁRIO</td>
            </tr>

            ${linhasTabela}
          </table>
        </div>
      `;
    }

    function exportarMes() {
      if (!registrosFiltrados.length) {
        alert("Nenhum registro carregado para exportar.");
        return;
      }

      const vtr = elFiltroVtr.value;
      const mes = Number(elFiltroMes.value);
      const ano = Number(elFiltroAno.value);
      const referencia = `${nomeMesNumero(mes)} ${ano}`;
      const dadosVtr = VTRS[vtr] || {};
      const paginas = quebrarEmPaginas(registrosFiltrados, 14);

      const htmlPaginas = paginas.map((pagina, index) =>
        gerarBlocoPaginaPdf(vtr, referencia, dadosVtr, pagina, index + 1, paginas.length)
      ).join("");

      const w = window.open("", "_blank");
      if (!w) {
        alert("Não foi possível abrir a janela do PDF.");
        return;
      }

      w.document.write(`
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
          <meta charset="UTF-8">
          <title>DIÁRIO DE BORDO FÍSICO - ${esc(vtr)} - ${esc(referencia)}</title>
          <style>
            @page {
              size: A4 landscape;
              margin: 10mm;
            }

            html, body {
              margin: 0;
              padding: 0;
              background: #fff;
              font-family: Arial, Helvetica, sans-serif;
              color: #000;
            }

            .folha {
              width: 100%;
              padding: 0;
            }

            .quebra-pagina {
              page-break-after: always;
            }

            table {
              width: 100%;
              border-collapse: collapse;
              table-layout: fixed;
            }

            td, th {
              border: 1px solid #000;
              font-size: 10px;
              padding: 4px 4px;
              text-align: center;
              vertical-align: middle;
              word-break: break-word;
            }

            .titulo td {
              font-weight: bold;
              font-size: 16px;
              height: 32px;
              letter-spacing: 0.2px;
            }

            .subref td {
              font-weight: bold;
              font-size: 12px;
              height: 24px;
            }

            .identificacao td {
              font-size: 11px;
              text-align: left;
              height: 28px;
              padding-left: 6px;
            }

            .cabecalho td {
              font-weight: bold;
              height: 44px;
              line-height: 1.1;
            }

            .linha-dados td {
              height: 28px;
            }

            .w1 { width: 5.34%; }
            .w2 { width: 13.34%; }
            .w3 { width: 8.89%; }
            .w4 { width: 7.12%; }
            .w5 { width: 8.90%; }
            .w6 { width: 7.12%; }
            .w7 { width: 12.45%; }
            .w8 { width: 8.89%; }
            .w9 { width: 10.67%; }
            .w10 { width: 11.56%; }

            .al-esq {
              text-align: left;
              padding-left: 6px;
            }
          </style>
        </head>
        <body>
          ${htmlPaginas}
          <script>
            window.onload = function () {
              window.print();
            };
          <\/script>
        </body>
        </html>
      `);

      w.document.close();
    }

    function editarVtr(chave) {
      const itemId = chave.replace(/[^a-zA-Z0-9]/g, "_");
      const view = document.getElementById(`view_${itemId}`);
      const edit = document.getElementById(`edit_${itemId}`);
      if (view) view.classList.add("hidden");
      if (edit) edit.classList.remove("hidden");
    }

    function cancelarEdicaoVtr(chave) {
      renderCadastroVtrs();
    }

    function salvarEdicaoVtr(chave) {
      const senha = prompt("Senha admin:");
      if (senha !== ADMIN_SENHA) {
        alert("Senha inválida.");
        return;
      }

      const itemId = chave.replace(/[^a-zA-Z0-9]/g, "_");

      VTRS[chave] = {
        ...VTRS[chave],
        nome: chave,
        tipo: document.getElementById(`tipo_${itemId}`).value.trim(),
        placa: document.getElementById(`placa_${itemId}`).value.trim(),
        marcamodelo: document.getElementById(`marcamodelo_${itemId}`).value.trim(),
        orgao: document.getElementById(`orgao_${itemId}`).value.trim(),
        status: document.getElementById(`status_${itemId}`).value.trim(),
        descricao: document.getElementById(`descricao_${itemId}`).value.trim(),
        ano: document.getElementById(`ano_${itemId}`).value.trim()
      };

      salvarCadastroVtrs();
      preencherVtrsSelects();
      renderCadastroVtrs();

      if (elVtr.value === chave) {
        atualizarInfoVtr();
      }

      alert("Cadastro de VTR atualizado com sucesso.");
    }

    window.editarVtr = editarVtr;
    window.cancelarEdicaoVtr = cancelarEdicaoVtr;
    window.salvarEdicaoVtr = salvarEdicaoVtr;

    tabLancamentoBtn.addEventListener("click", function() {
      abrirAba("lancamento");
    });

    tabExportarBtn.addEventListener("click", function() {
      abrirAba("exportar");
    });

    tabCadastroBtn.addEventListener("click", function() {
      abrirAba("cadastro");
    });

    elBtnEntrar.addEventListener("click", login);
    elBtnSalvar.addEventListener("click", salvar);
    elBtnBuscarVtr.addEventListener("click", buscarRegistrosPorVtr);
    elBtnExportarMes.addEventListener("click", exportarMes);
    elBtnEditarOdometro.addEventListener("click", editarOdometroAdmin);

    elVtr.addEventListener("change", async function() {
      atualizarInfoVtr();
      await atualizarKmBaseDaVtr();
    });

    elSaidaSelect.addEventListener("change", aplicarRetornoAutomatico);
    elSaidaSelect.addEventListener("change", controlarCamposSaida);
    elRetornoSelect.addEventListener("change", controlarCamposRetorno);

    elIdFunc.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });

    elHoraChegada.addEventListener("keydown", function(e) {
      if (e.key === "Enter") salvar();
    });

    if (!elData.value) {
      elData.value = hojeISO();
    }

    preencherUsuariosSelect();
    preencherVtrsSelects();
    preencherAnos();
    elFiltroMes.value = String(new Date().getMonth() + 1);
    atualizarInfoVtr();
    renderCadastroVtrs();
    abrirAba("lancamento");
  </script>
</body>
</html>
