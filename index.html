<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🚒 Diário de Bordo</title>
  <meta name="theme-color" content="#b71c1c" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    :root{
      --bg:#e9edf3;
      --card:#ffffff;
      --soft:#fafafa;
      --primary:#d51313;
      --primary-dark:#8e0000;
      --success:#2e7d32;
      --warning:#b45309;
      --muted:#666;
      --text:#24303f;
      --border:#d8dde4;
      --shadow:0 4px 14px rgba(0,0,0,.08);
      --info:#0f4c81;
      --info-soft:#eef6ff;
    }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--text); }
    body { padding:0 0 92px 0; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, #cc1010 0%, #b71c1c 100%);
      color:#fff;
      padding:14px 16px 12px 16px;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    
    .app-header-top { display:flex; align-items:center; gap:12px; }
    .app-header-info { flex:1; min-width:0; }

    .topo-status-boxes{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:138px;
      max-width:185px;
    }

    .condutor-logado-box, .vtr-topo-box {
      color:#fff;
      padding:10px 12px;
      border-radius:14px;
      font-size:13px;
      font-weight:800;
      line-height:1.2;
      transition: all 0.3s ease;
    }

    .condutor-logado-inativo, .vtr-topo-inativa {
      background: rgba(107,114,128,.35);
      border: 1px solid rgba(255,255,255,.20);
    }

    .condutor-logado-ativo {
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      border: 1px solid #ffffff;
    }

    .vtr-topo-ativa {
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      border: 1px solid #ffffff;
    }

    .condutor-logado-titulo, .vtr-topo-titulo { display:block; font-size:10px; opacity:.9; text-transform:uppercase; margin-bottom:3px; }
    .condutor-logado-nome, .vtr-topo-nome { display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .app-logo { width:58px; height:58px; border-radius:18px; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:28px; flex:0 0 58px; border:1px solid rgba(255,255,255,.18); }
    .app-title { margin:0; font-size:20px; font-weight:800; }
    .app-subtitle { font-size:11px; opacity:.95; }

    .conteudo-app { padding: 16px; position: relative; }
    .aba { display: none; }
    .aba.active { display: block; }
    .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:18px; box-shadow:var(--shadow); }
    .hidden { display:none !important; }

    label { display:block; font-size:16px; font-weight:bold; margin:8px 0 6px; }
    input, select { width:100%; padding:14px; border-radius:12px; border:1px solid #ccc; font-size:16px; margin-bottom:10px; outline:none; }
    button { width:100%; padding:15px; border:none; border-radius:16px; background:var(--primary); color:#fff; font-size:17px; font-weight:bold; cursor:pointer; }
    
    .ok { color:var(--success); font-weight:bold; margin-top:8px; }
    .erro { color:var(--primary); font-weight:bold; margin-top:8px; }

    .rodape-tabs { position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; padding:10px; border-top:1px solid var(--border); gap:8px; z-index: 1001; }
    .rodape-btn { flex:1; border:none; background:#eee; border-radius:12px; padding:10px; display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; color: var(--muted); }
    .rodape-btn.active { background: var(--primary); color: #fff; }
  </style>
</head>
<body>

  <div class="app-header">
    <div class="app-header-top">
      <div class="app-logo">🚒</div>
      <div class="app-header-info">
        <h1 class="app-title">Diário de Bordo</h1>
        <div class="app-subtitle">CB São Lourenço do Sul</div>
      </div>
      <div class="topo-status-boxes">
        <div class="condutor-logado-box condutor-logado-inativo" id="condutorLogadoTopo">
          <span class="condutor-logado-titulo">Condutor</span>
          <span class="condutor-logado-nome" id="condutorLogadoNome">Não logado</span>
        </div>
        <div class="vtr-topo-box vtr-topo-inativa" id="vtrTopoBox">
          <span class="vtr-topo-titulo">VTR</span>
          <span class="vtr-topo-nome" id="vtrTopoNome">Nenhuma</span>
        </div>
      </div>
    </div>
  </div>

  <div class="conteudo-app">
    <div id="abaInicio" class="aba active">
      <div class="card">
        <h2>🏠 Início</h2>
        <p>Selecione a aba Lançamento para registrar.</p>
      </div>
    </div>

    <div id="abaLancamento" class="aba">
      <div class="card" id="loginBox">
        <label>ID Funcional</label>
        <input id="idFunc" type="text" inputmode="numeric" placeholder="Ex: 2614960" />
        <label>Senha</label>
        <input id="senhaLogin" type="password" placeholder="Sua ID no 1º acesso" />
        <button type="button" id="btnEntrar">Entrar</button>
        <div id="userOk"></div>
      </div>

      <div class="card hidden" id="formBox">
        <label>VTR</label>
        <select id="vtrSelect"></select>
        <button id="btnSair" style="background:#666; margin-top: 20px;">Sair / Trocar Condutor</button>
      </div>
    </div>
  </div>

  <div class="rodape-tabs">
    <button class="rodape-btn active" id="tabInicioBtn"><span>🏠</span><span>Início</span></button>
    <button class="rodape-btn" id="tabLancamentoBtn"><span>📋</span><span>Lançamento</span></button>
  </div>

  <script>
    const USUARIOS = [
      { guerra: "1º SGT VICENTE", id: "2614960" },
      { guerra: "2º SGT ANDERSON", id: "2882930" },
      { guerra: "SD MOTTA", id: "4626338" },
      { guerra: "1º SGT DIEFERSON", id: "2972719" },
      { guerra: "SD CAMACHO", id: "3698696" },
      { guerra: "1º SGT BATISTA", id: "2692449" },
      { guerra: "SD LARSSON", id: "4490380" },
      { guerra: "SD TOMASCHEWSKI", id: "3218627" },
      { guerra: "1º TEN MARCELO", id: "2423286" },
      { guerra: "SD ISQUIERDO", id: "3697665" },
      { guerra: "SD MAX", id: "3084620" },
      { guerra: "2º SGT LISCANO", id: "3698530" },
      { guerra: "SD BORGES", id: "3698440" },
      { guerra: "SD SOARES", id: "4625595" },
      { guerra: "SD PEGLOW", id: "4783069" },
      { guerra: "SD BATISTA", id: "3702847" },
      { guerra: "2º SGT VINICIUS", id: "2910233" },
      { guerra: "SD WILLIAM", id: "4355504" }
    ];

    let logado = null;

    function atualizarTopo() {
      const box = document.getElementById("condutorLogadoTopo");
      const nomeLabel = document.getElementById("condutorLogadoNome");
      if (logado) {
        box.classList.replace("condutor-logado-inativo", "condutor-logado-ativo");
        nomeLabel.textContent = logado.guerra;
      } else {
        box.classList.replace("condutor-logado-ativo", "condutor-logado-inativo");
        nomeLabel.textContent = "Não logado";
      }
    }

    function login() {
      const id = document.getElementById("idFunc").value;
      const senha = document.getElementById("senhaLogin").value;
      const user = USUARIOS.find(u => u.id === id);

      // No primeiro acesso a senha é a própria ID
      if (user && senha === id) {
        logado = user;
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("formBox").classList.remove("hidden");
        document.getElementById("userOk").innerHTML = "";
        atualizarTopo();
      } else {
        document.getElementById("userOk").innerHTML = "<div class='erro'>ID ou Senha incorretos</div>";
      }
    }

    // Eventos
    document.getElementById("btnEntrar").addEventListener("click", login);
    
    document.getElementById("btnSair").addEventListener("click", () => {
      logado = null;
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("formBox").classList.add("hidden");
      document.getElementById("idFunc").value = "";
      document.getElementById("senhaLogin").value = "";
      atualizarTopo();
    });

    // Abas
    document.querySelectorAll('.rodape-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.rodape-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.id.replace('tab', 'aba').replace('Btn', '');
        document.getElementById(target).classList.add('active');
      });
    });

    // Preencher VTRs
    const vtrs = ["ABT-0535", "ABT-7992", "AR-426", "ATP-1225", "ATP-9316"];
    const sel = document.getElementById("vtrSelect");
    sel.innerHTML = '<option value="">Selecione...</option>' + vtrs.map(v => `<option>${v}</option>`).join('');
    
    sel.addEventListener("change", (e) => {
      const box = document.getElementById("vtrTopoBox");
      const label = document.getElementById("vtrTopoNome");
      if(e.target.value) {
        box.classList.replace("vtr-topo-inativa", "vtr-topo-ativa");
        label.textContent = e.target.value;
      } else {
        box.classList.replace("vtr-topo-ativa", "vtr-topo-inativa");
        label.textContent = "Nenhuma";
      }
    });
  </script>
</body>
</html>
